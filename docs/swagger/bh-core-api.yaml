openapi: 3.0.0

info:
  title: BH Core API
  description: Main API for Breaze & Harold Veterinary System
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Appointments
    description: Appointment management endpoints

  - name: Clients
    description: Client (pet owner) management endpoints

  - name: Pets
    description: Pet management endpoints

paths:

  /api/appointments/pre-create:

    post:
      tags:
        - Appointments

      summary: Validate appointment information before creation

      description: >
        Allows a client or receptionist to validate veterinarian availability
        and calculate the total amount before continuing to the payment flow.

      requestBody:
        required: true

        content:
          application/json:

            schema:
              $ref: '#/components/schemas/PreCreateAppointmentRequest'

      responses:

        '200':
          description: Appointment validated successfully and ready for payment flow

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/PreCreateAppointmentResponse'

        '400':
          description: Validation error

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '409':
          description: Veterinarian schedule conflict detected

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/appointments/{id}/cancel:

    patch:
      tags:
        - Appointments

      summary: Cancel an appointment

      description: >
        Allows a client or receptionist to cancel an appointment
        before it has been attended by the veterinarian.
        A cancellation reason is required.

      parameters:
        - name: id
          in: path
          required: true

          schema:
            type: string
            format: uuid

      requestBody:
        required: true

        content:
          application/json:

            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'

      responses:

        '200':
          description: Appointment cancelled successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/AppointmentStatusResponse'

        '400':
          description: Validation error

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

              example:
                message: Cancellation reason is required

        '404':
          description: Appointment not found

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

              example:
                message: Appointment not found

        '409':
          description: Appointment cannot be cancelled because it has already been attended

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

              example:
                message: Appointment cannot be cancelled because it has already been attended

  /api/clients:

    post:
      tags:
        - Clients

      summary: Register a new client

      description: >
        Creates a new client (pet owner) record with their contact information.
        Typically performed by a receptionist. The action is notified to bh-audit.

      requestBody:
        required: true

        content:
          application/json:

            schema:
              $ref: '#/components/schemas/CreateClientRequest'

      responses:

        '201':
          description: Client created successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ClientResponse'

        '400':
          description: Validation error

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '409':
          description: A client with the same email or document number already exists

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Clients

      summary: List clients

      description: >
        Returns a paginated list of clients. Supports a free-text search filter
        applied over firstName, lastName, email and documentNumber.

      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1

        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100

        - name: search
          in: query
          required: false
          description: Free-text search on firstName, lastName, email, or documentNumber.
          schema:
            type: string

      responses:

        '200':
          description: Clients retrieved successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ClientListResponse'

  /api/clients/{id}:

    get:
      tags:
        - Clients

      summary: Get a client by id

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid

      responses:

        '200':
          description: Client retrieved successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ClientResponse'

        '404':
          description: Client not found

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Clients

      summary: Update an existing client

      description: >
        Updates a client's contact information. The action is notified to bh-audit
        (Acceptance Criterion 3 of BH-7).

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid

      requestBody:
        required: true

        content:
          application/json:

            schema:
              $ref: '#/components/schemas/UpdateClientRequest'

      responses:

        '200':
          description: Client updated successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ClientResponse'

        '400':
          description: Validation error

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
          description: Client not found

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '409':
          description: Email or document number already in use by another client

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/pets:

    post:
      tags:
        - Pets

      summary: Register a new pet

      description: >
        Creates a new pet record linked to an existing client. Newly created pets
        start with status ACTIVE by default. The action is notified to bh-audit.

      requestBody:
        required: true

        content:
          application/json:

            schema:
              $ref: '#/components/schemas/CreatePetRequest'

      responses:

        '201':
          description: Pet created successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/PetResponse'

        '400':
          description: Validation error

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
          description: Referenced client (clientId) does not exist

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Pets

      summary: List pets

      description: >
        Returns a paginated list of pets. Can be filtered by client, status
        and a free-text search applied over name and breed.

      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1

        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100

        - name: clientId
          in: query
          required: false
          description: Filter pets by owner.
          schema:
            type: string
            format: uuid

        - name: status
          in: query
          required: false
          description: Filter pets by operational status.
          schema:
            $ref: '#/components/schemas/PetStatus'

        - name: search
          in: query
          required: false
          description: Free-text search on name or breed.
          schema:
            type: string

      responses:

        '200':
          description: Pets retrieved successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/PetListResponse'

  /api/pets/{id}:

    get:
      tags:
        - Pets

      summary: Get a pet by id

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid

      responses:

        '200':
          description: Pet retrieved successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/PetResponse'

        '404':
          description: Pet not found

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Pets

      summary: Update a pet's basic information

      description: >
        Updates the mutable fields of a pet (name, breed, color, weight).
        Species, birthDate and clientId cannot be modified after creation.
        Status transitions are handled by the hospitalization flow, not this endpoint.
        Weight updates here also satisfy AC2 of BH-8 when triggered from a clinical visit.
        The action is notified to bh-audit.

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid

      requestBody:
        required: true

        content:
          application/json:

            schema:
              $ref: '#/components/schemas/UpdatePetRequest'

      responses:

        '200':
          description: Pet updated successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/PetResponse'

        '400':
          description: Validation error

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
          description: Pet not found

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/pets/{id}/status:

    patch:
      tags:
        - Pets

      summary: Change a pet's operational status

      description: >
        Transitions a pet between operational states (state machine of BH-9).
        Typically invoked by the hospitalization module when a pet is admitted,
        discharged, or registered as deceased. Direct invocation is restricted
        to veterinarian or admin roles.


        Valid transitions:

        - ACTIVE to HOSPITALIZED (pet admitted for hospitalization, AC2)

        - ACTIVE to DECEASED (exceptional cases without prior admission)

        - HOSPITALIZED to ACTIVE (discharged - recovered, AC3)

        - HOSPITALIZED to DECEASED (discharged - deceased, AC3)


        DECEASED is a terminal state and cannot transition to any other.
        The action is notified to bh-audit.

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid

      requestBody:
        required: true

        content:
          application/json:

            schema:
              $ref: '#/components/schemas/ChangePetStatusRequest'

      responses:

        '200':
          description: Pet status updated successfully

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/PetResponse'

        '400':
          description: Invalid transition (e.g. trying to leave DECEASED or an unsupported pair)

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
          description: Pet not found

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '409':
          description: Pet is already in the requested status

          content:
            application/json:

              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  schemas:

    PreCreateAppointmentRequest:

      type: object

      required:
        - petId
        - veterinarianId
        - appointmentDate
        - appointmentTime
        - serviceIds

      properties:

        petId:
          type: string
          format: uuid

        veterinarianId:
          type: string
          format: uuid

        appointmentDate:
          type: string
          format: date

        appointmentTime:
          type: string
          example: "14:00"

        serviceIds:
          type: array

          items:
            type: string
            format: uuid

    PreCreateAppointmentResponse:

      type: object

      properties:

        totalAmount:
          type: number
          example: 120000

        currency:
          type: string
          example: COP

        message:
          type: string
          example: Appointment validation completed successfully

    ClientResponse:

      type: object

      properties:

        id:
          type: string
          format: uuid

        firstName:
          type: string
          example: "Juan"

        lastName:
          type: string
          example: "Pérez"

        email:
          type: string
          format: email
          example: "juan.perez@example.com"

        phoneNumber:
          type: string
          example: "+57 300 123 4567"

        documentNumber:
          type: string
          example: "1053867123"

        address:
          type: string
          nullable: true
          example: "Calle 23 # 45-67"

        city:
          type: string
          nullable: true
          example: "Manizales"

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    CreateClientRequest:

      type: object

      required:
        - firstName
        - lastName
        - email
        - phoneNumber
        - documentNumber

      properties:

        firstName:
          type: string
          minLength: 2
          maxLength: 50
          example: "Juan"

        lastName:
          type: string
          minLength: 2
          maxLength: 50
          example: "Pérez"

        email:
          type: string
          format: email
          example: "juan.perez@example.com"

        phoneNumber:
          type: string
          example: "+57 300 123 4567"

        documentNumber:
          type: string
          example: "1053867123"

        address:
          type: string
          example: "Calle 23 # 45-67"

        city:
          type: string
          example: "Manizales"

    UpdateClientRequest:

      type: object

      required:
        - firstName
        - lastName
        - email
        - phoneNumber

      properties:

        firstName:
          type: string
          minLength: 2
          maxLength: 50

        lastName:
          type: string
          minLength: 2
          maxLength: 50

        email:
          type: string
          format: email

        phoneNumber:
          type: string

        address:
          type: string

        city:
          type: string

    ClientListResponse:

      type: object

      properties:

        data:
          type: array

          items:
            $ref: '#/components/schemas/ClientResponse'

        total:
          type: integer
          example: 145

        page:
          type: integer
          example: 1

        pageSize:
          type: integer
          example: 20

    PetStatus:

      type: string

      enum:
        - ACTIVE
        - HOSPITALIZED
        - DECEASED

      example: ACTIVE

      description: >
        Current operational state of the pet. ACTIVE is the default for newly
        registered pets. Transitions to HOSPITALIZED and DECEASED are driven by
        the hospitalization module, not by direct edits.

    PetResponse:

      type: object

      properties:

        id:
          type: string
          format: uuid

        clientId:
          type: string
          format: uuid
          description: ID of the owning client.

        name:
          type: string
          example: "Firulais"

        species:
          type: string
          example: "Perro"

        breed:
          type: string
          example: "Golden Retriever"

        color:
          type: string
          example: "Dorado"

        birthDate:
          type: string
          format: date
          example: "2020-03-15"

        weight:
          type: number
          format: float
          minimum: 0
          example: 25.5
          description: Last recorded weight in kilograms.

        status:
          $ref: '#/components/schemas/PetStatus'

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    CreatePetRequest:

      type: object

      required:
        - clientId
        - name
        - species
        - breed
        - color
        - birthDate
        - weight

      properties:

        clientId:
          type: string
          format: uuid
          description: ID of the owning client. Must reference an existing client.

        name:
          type: string
          minLength: 1
          maxLength: 50
          example: "Firulais"

        species:
          type: string
          example: "Perro"

        breed:
          type: string
          example: "Golden Retriever"

        color:
          type: string
          example: "Dorado"

        birthDate:
          type: string
          format: date
          example: "2020-03-15"

        weight:
          type: number
          format: float
          minimum: 0
          example: 25.5
          description: Initial weight in kilograms.

    UpdatePetRequest:

      type: object

      required:
        - name
        - breed
        - color
        - weight

      properties:

        name:
          type: string
          minLength: 1
          maxLength: 50

        breed:
          type: string

        color:
          type: string

        weight:
          type: number
          format: float
          minimum: 0
          description: Pet weight in kilograms. Updated whenever the pet is attended (BH-8 AC2).

    PetListResponse:

      type: object

      properties:

        data:
          type: array

          items:
            $ref: '#/components/schemas/PetResponse'

        total:
          type: integer
          example: 73

        page:
          type: integer
          example: 1

        pageSize:
          type: integer
          example: 20

    ChangePetStatusRequest:

      type: object

      required:
        - status

      properties:

        status:
          $ref: '#/components/schemas/PetStatus'

        reason:
          type: string
          nullable: true
          description: Optional note describing the reason for the state transition.
          example: "Admitted for surgery"

    CancelAppointmentRequest:

      type: object

      required:
        - cancellationReason

      properties:

        cancellationReason:
          type: string
          minLength: 5
          example: Client is unable to attend the appointment

    AppointmentStatusResponse:

      type: object

      properties:

        appointmentId:
          type: string
          format: uuid

        status:
          type: string
          example: Cancelled

        message:
          type: string
          example: Appointment cancelled successfully

    ErrorResponse:

      type: object

      properties:

        message:
          type: string
          example: Veterinarian already has an appointment at the selected date and time