apiVersion: apps/v1
kind: Deployment
metadata:
  name: bh-audit-db
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bh-audit-db
  template:
    metadata:
      labels:
        app: bh-audit-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "bh_audit"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bh-audit-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bh-audit-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: bh-audit-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: bh-audit-db-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: bh-audit-db-service
  namespace: default
spec:
  selector:
    app: bh-audit-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP