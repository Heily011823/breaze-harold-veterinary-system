apiVersion: apps/v1
kind: Deployment
metadata:
  name: bh-core
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bh-core
  template:
    metadata:
      labels:
        app: bh-core
    spec:
      containers:
        - name: bh-core
          image: bh-core:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: bh-core-config
                  key: NODE_ENV
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: bh-core-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: bh-core-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: bh-core-config
                  key: DB_NAME
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: bh-core-config
                  key: PORT
            - name: BH_AUDIT_URL
              valueFrom:
                configMapKeyRef:
                  name: bh-core-config
                  key: BH_AUDIT_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: bh-core-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bh-core-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10