name: CD — Despliegue Continuo

on:
  push:
    branches:
      - main

jobs:
  # ================================
  # Job 1: Build y push imagen bh-audit
  # ================================
  deploy-bh-audit:
    name: Build y Deploy bh-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen bh-audit
        uses: docker/build-push-action@v5
        with:
          context: ./bh-audit
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bh-audit:latest
            ${{ secrets.DOCKER_USERNAME }}/bh-audit:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================
  # Job 2: Build y push imagen bh-core
  # ================================
  deploy-bh-core:
    name: Build y Deploy bh-core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Verificar si bh-core existe
        id: check-core
        run: |
          if [ -f "bh-core/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Configurar Docker Buildx
        if: steps.check-core.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        if: steps.check-core.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen bh-core
        if: steps.check-core.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./bh-core
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bh-core:latest
            ${{ secrets.DOCKER_USERNAME }}/bh-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================
  # Job 3: Despliegue en Kubernetes
  # ================================
  deploy-kubernetes:
    name: Desplegar en Kubernetes
    runs-on: ubuntu-latest
    needs: [deploy-bh-audit, deploy-bh-core]

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configurar kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Aplicar Secrets
        run: |
          kubectl apply -f k8s/bh-audit/secret.yaml
          kubectl apply -f k8s/bh-core/secret.yaml

      - name: Aplicar ConfigMaps
        run: |
          kubectl apply -f k8s/bh-audit/configmap.yaml
          kubectl apply -f k8s/bh-core/configmap.yaml

      - name: Aplicar bases de datos
        run: |
          kubectl apply -f k8s/postgres/

      - name: Aplicar servicios
        run: |
          kubectl apply -f k8s/bh-audit/service.yaml
          kubectl apply -f k8s/bh-core/service.yaml

      - name: Actualizar imagen bh-audit en Kubernetes
        run: |
          kubectl set image deployment/bh-audit \
            bh-audit=${{ secrets.DOCKER_USERNAME }}/bh-audit:${{ github.sha }}

      - name: Actualizar imagen bh-core en Kubernetes
        run: |
          kubectl set image deployment/bh-core \
            bh-core=${{ secrets.DOCKER_USERNAME }}/bh-core:${{ github.sha }}

      - name: Aplicar Ingress
        run: |
          kubectl apply -f k8s/ingress-controller.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verificar despliegue bh-audit
        run: |
          kubectl rollout status deployment/bh-audit --timeout=120s

      - name: Verificar despliegue bh-core
        run: |
          kubectl rollout status deployment/bh-core --timeout=120s